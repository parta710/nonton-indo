name: Build

permissions:
  contents: write
  
concurrency:
  group: "build"
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - '*.md'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: "src"

      - name: Checkout builds branch
        uses: actions/checkout@v4
        with:
          ref: "builds"
          path: "builds"
          token: ${{ secrets.PAT_TOKEN }}
      - name: Clean old builds
        run: |
          cd $GITHUB_WORKSPACE/builds
          # Simpan repo.json (static metadata, bukan generated)
          cp repo.json /tmp/repo.json 2>/dev/null || true
          # Hapus semua kecuali .git
          find . -maxdepth 1 ! -name '.git' ! -name '.' -exec rm -rf {} +

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Plugins
        run: |
          cd $GITHUB_WORKSPACE/src
          chmod +x gradlew
          ./gradlew make makePluginsJson
          cp **/build/*.cs3 $GITHUB_WORKSPACE/builds/
          cp build/plugins.json $GITHUB_WORKSPACE/builds/
          # Restore repo.json
          cp /tmp/repo.json $GITHUB_WORKSPACE/builds/repo.json 2>/dev/null || true

      - name: Push builds
        run: |
          cd $GITHUB_WORKSPACE/builds
          git config --local user.email "herilrtg123@gmail.com"
          git config --local user.name "ExtremeBoyGG"
          git add -A
          git commit --amend -m "Build $GITHUB_SHA" || exit 0
          git push --force
